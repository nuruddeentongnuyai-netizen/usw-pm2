<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Smart Water Monitor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #eef2f7; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        .filter-bar { transition: height 7s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="p-6">

<div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-end mb-8">
        <div>
            <h1 class="text-4xl font-bold text-slate-800 tracking-tight">Smart Water Monitor</h1>
            <p class="text-slate-500">ระบบตรวจสอบและบำบัดน้ำเสียอัจฉริยะ</p>
        </div>
        <div class="flex gap-3">
            <button onclick="location.reload()" class="bg-white text-rose-500 px-6 py-2 rounded-xl font-semibold shadow-sm hover:shadow-md transition border border-rose-100">🛑 ปิดระบบ</button>
            <button onclick="startSystem()" class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-8 py-2 rounded-xl font-semibold shadow-lg shadow-blue-200 hover:shadow-blue-300 transition">▶ เริ่มการบำบัด</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <div class="glass-card p-6 rounded-3xl">
                <h2 class="text-lg font-semibold mb-4 text-slate-700">1. เลือกแหล่งกำเนิดน้ำเสีย</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="selectWater(this, 5.6, 155, 75, 'น้ำเสียจากครัวเรือน', 'สารแขวนลอยและแอมโมเนีย')" class="source-card text-left p-4 rounded-2xl border-2 border-white hover:border-blue-300 bg-white/50 transition">
                        <p class="font-bold text-slate-800">🏠 น้ำเสียจากครัวเรือน</p>
                    </button>
                    <button onclick="selectWater(this, 6.3, 85, 45, 'บ่อพักน้ำโรงเรียน', 'ใบไม้และเศษอาหาร')" class="source-card text-left p-4 rounded-2xl border-2 border-white hover:border-blue-300 bg-white/50 transition">
                        <p class="font-bold text-slate-800">🏫 บ่อพักน้ำโรงเรียน</p>
                    </button>
                </div>
            </div>

            <div class="glass-card p-6 rounded-3xl">
                <h2 class="text-lg font-semibold mb-6 text-slate-700">2. แอนิเมชันห้องกรองเครื่องบำบัด</h2>
                <div class="flex justify-between items-end h-40 bg-slate-900/5 rounded-2xl p-6 mb-6 border border-white">
                    <div class="text-center w-24"><div class="h-24 bg-white w-full rounded-xl relative overflow-hidden"><div id="barA" class="filter-bar absolute bottom-0 w-full bg-gradient-to-t from-slate-600 to-slate-400 h-0"></div></div><p class="text-xs mt-3 font-bold text-slate-600">SEDIMENT</p></div>
                    <div class="text-center w-24"><div class="h-24 bg-white w-full rounded-xl relative overflow-hidden"><div id="barB" class="filter-bar absolute bottom-0 w-full bg-gradient-to-t from-teal-600 to-teal-400 h-0"></div></div><p class="text-xs mt-3 font-bold text-slate-600">CARBON</p></div>
                    <div class="text-center w-24"><div class="h-24 bg-white w-full rounded-xl relative overflow-hidden"><div id="barC" class="filter-bar absolute bottom-0 w-full bg-gradient-to-t from-blue-600 to-blue-400 h-0"></div></div><p class="text-xs mt-3 font-bold text-slate-600">UV / OUT</p></div>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <h2 class="text-lg font-semibold text-slate-700 mb-2">3. แผงวัดค่าข้อมูล</h2>
            <div class="glass-card p-5 rounded-2xl border-l-4 border-l-blue-500"><div><p class="text-xs text-slate-400 uppercase font-bold tracking-wider">ค่า pH</p><p id="val-ph" class="text-2xl font-bold text-slate-800">0.0</p></div></div>
            <div class="glass-card p-5 rounded-2xl border-l-4 border-l-teal-500"><div><p class="text-xs text-slate-400 uppercase font-bold tracking-wider">ความขุ่น (NTU)</p><p id="val-turb" class="text-2xl font-bold text-slate-800">0</p></div></div>
            <div class="glass-card p-5 rounded-2xl border-l-4 border-l-indigo-500"><div><p class="text-xs text-slate-400 uppercase font-bold tracking-wider">ดัชนีกลิ่นเหม็น</p><p id="val-odor" class="text-2xl font-bold text-slate-800">0%</p></div></div>
        </div>
    </div>
</div>

<script>
    function selectWater(el, ph, turb, odor, inputDesc, detail) {
        document.getElementById('val-ph').innerText = ph;
        document.getElementById('val-turb').innerText = turb;
        document.getElementById('val-odor').innerText = odor + "%";
        document.getElementById('barA').style.height = '0%';
        document.getElementById('barB').style.height = '0%';
        document.getElementById('barC').style.height = '0%';
    }

    function startSystem() {
        document.getElementById('barA').style.height = '85%';
        document.getElementById('barB').style.height = '70%';
        document.getElementById('barC').style.height = '95%';
        setTimeout(() => {
            document.getElementById('val-ph').innerText = "7.2";
            document.getElementById('val-turb').innerText = "1.6";
            document.getElementById('val-odor').innerText = "0%";
        }, 7000);
    }
</script>
</body>
</html>
