<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Smart Water Monitor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f0f4f8; }
        .filter-bar { transition: height 7s ease-in-out; }
    </style>
</head>
<body class="p-6">

<div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-end mb-8">
        <div>
            <h1 class="text-3xl font-bold text-slate-800">Smart Water Monitor</h1>
            <p class="text-slate-500">ระบบตรวจสอบและบำบัดน้ำเสียอัจฉริยะ</p>
        </div>
        <div class="flex gap-3">
            <button onclick="location.reload()" class="bg-rose-50 text-rose-600 px-6 py-2 rounded-xl font-semibold hover:bg-rose-100 transition">🛑 ปิดระบบ</button>
            <button onclick="startSystem()" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-semibold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">▶ เริ่มการบำบัด</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                <h2 class="text-lg font-semibold mb-4 text-slate-700">1. เลือกแหล่งกำเนิดน้ำเสีย</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="selectWater(this, 5.6, 155, 75, 'น้ำเสียจากครัวเรือน (Graywater)', 'พบสารแขวนลอยและแอมโมเนียตกค้าง')" class="source-card text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-400 transition">
                        <p class="font-bold">🏠 น้ำเสียจากครัวเรือน</p>
                    </button>
                    <button onclick="selectWater(this, 6.3, 85, 45, 'บ่อพักน้ำโรงเรียน', 'น้ำขังเน่าเสียจากใบไม้และเศษอาหาร')" class="source-card text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-400 transition">
                        <p class="font-bold">🏫 น้ำขังเน่าเสียในบ่อโรงเรียน</p>
                    </button>
                    <button onclick="selectWater(this, 5.0, 210, 30, 'น้ำระบายจากแปลงเกษตร', 'มีการปนเปื้อนปุ๋ยและสารเคมี')" class="source-card text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-400 transition">
                        <p class="font-bold">🌱 น้ำระบายจากแปลงเกษตร</p>
                    </button>
                    <button onclick="selectWater(this, 5.9, 360, 90, 'น้ำคลองในเมือง', 'น้ำเสียจากท่อระบายน้ำใจกลางเมือง')" class="source-card text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-400 transition">
                        <p class="font-bold">🚣 น้ำคลองระบายน้ำใจกลางเมือง</p>
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                <h2 class="text-lg font-semibold mb-6 text-slate-700">2. แอนิเมชันห้องกรองเครื่องบำบัด</h2>
                <div class="flex justify-between items-end h-40 bg-slate-50 rounded-2xl p-6 mb-6">
                    <div class="text-center w-24"><div class="h-24 bg-slate-200 w-full rounded-xl relative overflow-hidden"><div id="barA" class="filter-bar absolute bottom-0 w-full bg-slate-500 h-0"></div></div><p class="text-xs mt-3 font-bold">SEDIMENT</p></div>
                    <div class="text-center w-24"><div class="h-24 bg-slate-200 w-full rounded-xl relative overflow-hidden"><div id="barB" class="filter-bar absolute bottom-0 w-full bg-teal-400 h-0"></div></div><p class="text-xs mt-3 font-bold">CARBON</p></div>
                    <div class="text-center w-24"><div class="h-24 bg-slate-200 w-full rounded-xl relative overflow-hidden"><div id="barC" class="filter-bar absolute bottom-0 w-full bg-blue-500 h-0"></div></div><p class="text-xs mt-3 font-bold">UV / OUT</p></div>
                </div>
            </div>

            <div id="console-box" class="bg-slate-900 p-6 rounded-3xl text-white font-mono text-sm hidden">
                <h2 class="font-bold text-teal-400 mb-4 flex items-center gap-2">🎛 บันทึกระบบกรองน้ำ (Console Diagnostics)</h2>
                <div id="log-container" class="space-y-2"></div>
            </div>
        </div>

        <div class="space-y-4">
            <h2 class="text-lg font-semibold text-slate-700 mb-2">3. แผงวัดค่าข้อมูล</h2>
            <div class="bg-white p-5 rounded-2xl border border-slate-100"><div><p class="text-xs text-slate-400">ค่า pH</p><p id="val-ph" class="text-2xl font-bold">0.0</p></div></div>
            <div class="bg-white p-5 rounded-2xl border border-slate-100"><div><p class="text-xs text-slate-400">ความขุ่น (NTU)</p><p id="val-turb" class="text-0">0</p></div></div>
            <div class="bg-white p-5 rounded-2xl border border-slate-100"><div><p class="text-xs text-slate-400">ดัชนีกลิ่นเหม็น</p><p id="val-odor" class="text-2xl font-bold">0%</p></div></div>
        </div>
    </div>
</div>

<script>
    function selectWater(el, ph, turb, odor, inputDesc, detail) {
        document.getElementById('val-ph').innerText = ph;
        document.getElementById('val-turb').innerText = turb;
        document.getElementById('val-odor').innerText = odor + "%";
        document.querySelectorAll('.source-card').forEach(c => c.style.borderColor = "#f1f5f9");
        el.style.borderColor = "#60a5fa";
        document.getElementById('console-box').classList.add('hidden');
    }

    function addLog(msg) {
        const log = document.getElementById('log-container');
        const time = new Date().toLocaleTimeString();
        log.innerHTML += `<p class="text-teal-300">[${time}] ${msg}</p>`;
    }

    function startSystem() {
        document.getElementById('console-box').classList.remove('hidden');
        document.getElementById('log-container').innerHTML = "";
        
        document.getElementById('barA').style.height = '85%';
        document.getElementById('barB').style.height = '70%';
        document.getElementById('barC').style.height = '95%';

        addLog("⚡ [ตัวกรองกายภาพ] คาร์บอนกัมมันต์กรองสิ่งเจือปน...");
        setTimeout(() => addLog("⚖️ [ระบบควบคุมเกณฑ์เคมี] ปรับค่า pH ให้เป็นกลาง..."), 2000);
        setTimeout(() => addLog("🔮 [รังสี UV-C] ฉายแสงฆ่าแบคทีเรียและสปอร์..."), 4000);
        setTimeout(() => {
            addLog("🎉 [บำบัดสมบูรณ์] คุณภาพผ่านเกณฑ์มาตรฐาน!");
            document.getElementById('val-ph').innerText = "7.2";
            document.getElementById('val-turb').innerText = "1.6";
            document.getElementById('val-odor').innerText = "0%";
        }, 6000);
    }
</script>
</body>
</html>
