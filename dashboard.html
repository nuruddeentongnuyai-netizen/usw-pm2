<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Smart Water Monitor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .filter-bar { transition: height 7s ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-6xl mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Smart Water Monitor</h1>
            <p class="text-slate-500">ระบบตรวจสอบและบำบัดน้ำเสียอัจฉริยะแบบ Real-time</p>
        </div>
        <div class="flex gap-3">
            <button onclick="location.reload()" class="bg-white border border-slate-200 text-slate-600 px-6 py-2 rounded-xl font-semibold hover:bg-slate-50 transition">🛑 ปิดระบบ</button>
            <button onclick="startSystem()" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-semibold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">▶ เริ่มการบำบัด</button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <section class="glass-card p-6 rounded-3xl border border-slate-100 shadow-sm">
                <h2 class="text-lg font-semibold mb-4 text-slate-700 flex items-center gap-2">💧 1. เลือกแหล่งกำเนิดน้ำเสีย</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="selectWater(this, 5.6, 155, 75, 'น้ำเสียครัวเรือน', 'พบสารแขวนลอยและแอมโมเนีย')" class="source-card text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-400 hover:bg-blue-50/50 transition">
                        <p class="font-bold text-slate-800">🏠 น้ำเสียจากครัวเรือน</p>
                        <p class="text-xs text-slate-400">pH 5.6 | ความขุ่น 155 NTU</p>
                    </button>
                    </div>
            </section>

            <section class="glass-card p-6 rounded-3xl border border-slate-100 shadow-sm">
                <h2 class="text-lg font-semibold mb-6 text-slate-700">⚙️ 2. แอนิเมชันห้องกรองเครื่องบำบัด</h2>
                <div class="flex justify-between items-end h-48 bg-slate-900/5 rounded-2xl p-6 mb-6">
                    <div class="text-center w-24">
                        <div class="h-32 bg-slate-200 w-full rounded-xl relative overflow-hidden"><div id="barA" class="filter-bar absolute bottom-0 w-full bg-slate-500 h-0"></div></div>
                        <p class="text-xs mt-3 font-bold text-slate-700">SEDIMENT</p>
                    </div>
                    </div>
            </section>
        </div>

        <aside class="space-y-4">
            <h2 class="text-lg font-semibold text-slate-700 mb-2">📊 3. แผงวัดค่าข้อมูล</h2>
            <div class="glass-card p-5 rounded-2xl border border-slate-100 shadow-sm">
                <p class="text-xs text-slate-400 font-medium uppercase">ค่า pH</p>
                <p id="val-ph" class="text-3xl font-bold text-blue-600">7.0</p>
            </div>
            </aside>
    </div>
</div>

<script>
    function selectWater(el, ph, turb, odor, input, desc) {
        document.getElementById('val-ph').innerText = ph;
        // ... update ค่าอื่นๆ
        document.querySelectorAll('.source-card').forEach(c => c.classList.replace('border-blue-400', 'border-slate-100'));
        el.classList.replace('border-slate-100', 'border-blue-400');
    }
    
    function startSystem() {
        document.getElementById('barA').style.height = '85%';
        // ... update graph อื่นๆ
    }
</script>
</body>
</html>
