<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แดชบอร์ดระบบบำบัดน้ำเสีย | EcoPure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f4f6f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
    
    <script>
        // --- ส่วนตรวจสอบสิทธิ์ ---
        // ตรวจสอบว่ามีสถานะล็อกอินหรือไม่ ถ้าไม่มีให้เด้งไปหน้า login.html
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body class="p-6">

    <div class="container mx-auto max-w-4xl bg-white p-8 rounded-2xl shadow-lg">
        <div class="flex justify-between items-center border-b pb-6 mb-8">
            <h2 class="text-2xl font-bold text-slate-800">📊 ระบบมอนิเตอร์เครื่องบำบัดน้ำเสีย</h2>
            <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-xl transition font-bold">ออกจากระบบ</button>
        </div>

        <div class="grid md:grid-cols-3 gap-6">
            <div class="card border-t-4 border-teal-500">
                <h3 class="font-bold text-slate-600">ค่าน้ำเข้า (pH)</h3>
                <p class="text-4xl font-bold text-teal-600 mt-2">5.4</p>
                <span class="text-sm text-orange-500">⚠️ ค่อนข้างเป็นกรด</span>
            </div>
            <div class="card border-t-4 border-blue-500">
                <h3 class="font-bold text-slate-600">ค่าน้ำออก (pH)</h3>
                <p class="text-4xl font-bold text-blue-600 mt-2">7.2</p>
                <span class="text-sm text-teal-600">✅ ผ่านเกณฑ์มาตรฐาน</span>
            </div>
            <div class="card border-t-4 border-yellow-500">
                <h3 class="font-bold text-slate-600">ปริมาณน้ำวันนี้</h3>
                <p class="text-4xl font-bold text-yellow-600 mt-2">1,450 <span class="text-base font-normal">ลิตร</span></p>
                <span class="text-sm text-slate-400">กำลังทำงานปกติ</span>
            </div>
        </div>
    </div>

    <script>
        // ระบบออกจากระบบ (Logout)
        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
