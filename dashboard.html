<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Smart Water Monitor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #eef2f6; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .filter-bar { transition: height 2s ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-5xl mx-auto">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-bold text-slate-800">Smart Water Monitor</h1>
            <p class="text-slate-500">ระบบตรวจสอบและบำบัดน้ำเสียอัจฉริยะ</p>
        </div>
        <div class="flex gap-3">
            <button onclick="location.reload()" class="bg-rose-100 text-rose-600 px-6 py-2 rounded-full font-semibold hover:bg-rose-200 transition">ปิดระบบ</button>
            <button onclick="startSystem()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-semibold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">เริ่มการบำบัด</button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-lg font-semibold mb-4 text-slate-700">เลือกแหล่งน้ำเสีย</h2>
                <div class="grid grid-cols-1 gap-4">
                    <button onclick="selectWater(this, 5.6, 155, 75)" class="source-card text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-400 transition">
                        <p class="font-bold">🏠 น้ำเสียจากครัวเรือน</p>
                        <p class="text-sm text-slate-400">pH: 5.6 | ความขุ่น: 155 NTU | กลิ่น: 75%</p>
                    </button>
                    <button onclick="selectWater(this, 4.2, 480, 98)" class="source-card text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-400 transition">
                        <p class="font-bold">🍳 น้ำทิ้งร้านอาหาร</p>
                        <p class="text-sm text-slate-400">pH: 4.2 | ความขุ่น: 480 NTU | กลิ่น: 98%</p>
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-lg font-semibold mb-6 text-slate-700">สถานะห้องกรองน้ำ</h2>
                <div class="flex justify-around items-end h-48 bg-slate-50 rounded-2xl p-4">
                    <div class="text-center w-20"><div class="h-32 bg-slate-200 w-full rounded-lg relative overflow-hidden"><div id="barA" class="filter-bar absolute bottom-0 w-full bg-slate-500 h-0"></div></div><p class="text-xs mt-2 font-medium">SEDIMENT</p></div>
                    <div class="text-center w-20"><div class="h-32 bg-slate-200 w-full rounded-lg relative overflow-hidden"><div id="barB" class="filter-bar absolute bottom-0 w-full bg-teal-500 h-0"></div></div><p class="text-xs mt-2 font-medium">CARBON</p></div>
                    <div class="text-center w-20"><div class="h-32 bg-slate-200 w-full rounded-lg relative overflow-hidden"><div id="barC" class="filter-bar absolute bottom-0 w-full bg-blue-500 h-0"></div></div><p class="text-xs mt-2 font-medium">UV / OUT</p></div>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <h2 class="text-lg font-semibold text-slate-700 mb-2">ข้อมูลเรียลไทม์</h2>
            <div class="bg-blue-600 p-6 rounded-3xl text-white shadow-xl shadow-blue-200">
                <p class="text-blue-100 text-sm">ค่า pH</p>
                <p id="val-ph" class="text-4xl font-bold">7.2</p>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-slate-100">
                <p class="text-slate-400 text-sm">ความขุ่น (NTU)</p>
                <p id="val-turb" class="text-3xl font-bold text-slate-800">2.8</p>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-slate-100">
                <p class="text-slate-400 text-sm">ดัชนีกลิ่นเหม็น</p>
                <p id="val-odor" class="text-3xl font-bold text-slate-800">0%</p>
            </div>
        </div>
    </div>
</div>

<script>
    function selectWater(el, ph, turb, odor) {
        document.getElementById('val-ph').innerText = ph;
        document.getElementById('val-turb').innerText = turb;
        document.getElementById('val-odor').innerText = odor + "%";
        document.querySelectorAll('.source-card').forEach(c => c.style.borderColor = "#f1f5f9");
        el.style.borderColor = "#3b82f6";
    }

    function startSystem() {
        document.getElementById('barA').style.height = '85%';
        document.getElementById('barB').style.height = '70%';
        document.getElementById('barC').style.height = '95%';
        setTimeout(() => {
            document.getElementById('val-ph').innerText = "7.2";
            document.getElementById('val-turb').innerText = "2.8";
            document.getElementById('val-odor').innerText = "0%";
        }, 2000);
    }
</script>
</body>
</html>
