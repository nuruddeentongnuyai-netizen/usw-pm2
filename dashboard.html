<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Smart Water Monitor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .filter-bar { transition: height 7s ease-in-out; }
    </style>
</head>
<body class="p-6">

<div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-end mb-8">
        <div>
            <h1 class="text-3xl font-bold text-slate-800">Smart Water Monitor</h1>
            <p class="text-slate-500">ระบบตรวจสอบและบำบัดน้ำเสียอัจฉริยะ</p>
        </div>
        <div class="flex gap-3">
            <button onclick="location.reload()" class="bg-white text-rose-600 px-6 py-2 rounded-xl font-semibold border border-rose-200 hover:bg-rose-50 transition">🛑 ปิดระบบ</button>
            <button onclick="startSystem()" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-semibold shadow-md hover:bg-blue-700 transition">▶ เริ่มการบำบัด</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                <h2 class="text-lg font-semibold mb-4 text-slate-700">1. เลือกแหล่งกำเนิดน้ำเสีย</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="selectWater(this, 5.6, 155, 75, 'น้ำเสียจากครัวเรือน')" class="source-card text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-400 hover:bg-slate-50 transition">
                        <p class="font-bold text-slate-700">🏠 น้ำเสียจากครัวเรือน</p>
                    </button>
                    <button onclick="selectWater(this, 6.3, 85, 45, 'บ่อพักน้ำโรงเรียน')" class="source-card text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-400 hover:bg-slate-50 transition">
                        <p class="font-bold text-slate-700">🏫 บ่อพักน้ำโรงเรียน</p>
                    </button>
                    <button onclick="selectWater(this, 5.0, 210, 30, 'น้ำจากแปลงเกษตร')" class="source-card text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-400 hover:bg-slate-50 transition">
                        <p class="font-bold text-slate-700">🌱 น้ำระบายจากแปลงเกษตร</p>
                    </button>
                    <button onclick="selectWater(this, 5.9, 360, 90, 'น้ำคลองในเมือง')" class="source-card text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-400 hover:bg-slate-50 transition">
                        <p class="font-bold text-slate-700">🚣 น้ำคลองระบายน้ำใจกลางเมือง</p>
                    </button>
                </div>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                <h2 class="text-lg font-semibold mb-6 text-slate-700">2. แอนิเมชันห้องกรองเครื่องบำบัด</h2>
                <div class="flex justify-between items-end h-40 bg-slate-100 rounded-2xl p-6 mb-6">
                    <div class="text-center w-24"><div class="h-24 bg-slate-200 w-full rounded-xl relative overflow-hidden"><div id="barA" class="filter-bar absolute bottom-0 w-full bg-slate-500 h-0"></div></div><p class="text-xs mt-3 font-bold text-slate-700">SEDIMENT</p></div>
                    <div class="text-center w-24"><div class="h-24 bg-slate-200 w-full rounded-xl relative overflow-hidden"><div id="barB" class="filter-bar absolute bottom-0 w-full bg-teal-400 h-0"></div></div><p class="text-xs mt-3 font-bold text-slate-700">CARBON</p></div>
                    <div class="text-center w-24"><div class="h-24 bg-slate-200 w-full rounded-xl relative overflow-hidden"><div id="barC" class="filter-bar absolute bottom-0 w-full bg-blue-500 h-0"></div></div><p class="text-xs mt-3 font-bold text-slate-700">UV / OUT</p></div>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <h2 class="text-lg font-semibold text-slate-700 mb-2">3. แผงวัดค่าข้อมูล</h2>
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm"><div><p class="text-xs text-slate-400">ค่า pH</p><p id="val-ph" class="text-2xl font-bold text-slate-800">0.0</p></div></div>
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm"><div><p class="text-xs text-slate-400">ความขุ่น (NTU)</p><p id="val-turb" class="text-2xl font-bold text-slate-800">0</p></div></div>
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm"><div><p class="text-xs text-slate-400">ดัชนีกลิ่นเหม็น</p><p id="val-odor" class="text-2xl font-bold text-slate-800">0%</p></div></div>
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-md mt-6 text-white h-64 overflow-y-auto">
                <h3 class="text-sm font-semibold mb-3">📋 ประวัติบันทึกการทำงาน</h3>
                <table class="w-full text-xs text-left"><tbody id="log-table"></tbody></table>
            </div>
        </div>
    </div>
</div>

<script>
    function addLog(message, colorClass) {
        const logTable = document.getElementById('log-table');
        const now = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const row = document.createElement('tr');
        row.innerHTML = `<td class="py-1 text-slate-400 pr-2">${now}</td><td class="py-1 ${colorClass}">${message}</td>`;
        logTable.prepend(row);
    }

    function selectWater(el, ph, turb, odor, name) {
        // รีเซ็ตแอนิเมชันให้เป็น 0 ทันทีที่เลือก
        document.getElementById('barA').style.height = '0%';
        document.getElementById('barB').style.height = '0%';
        document.getElementById('barC').style.height = '0%';
        
        document.getElementById('val-ph').innerText = ph;
        document.getElementById('val-turb').innerText = turb;
        document.getElementById('val-odor').innerText = odor + "%";
        document.querySelectorAll('.source-card').forEach(c => c.style.borderColor = "#e2e8f0");
        el.style.borderColor = "#3b82f6";
        addLog(`เลือกแหล่งน้ำ: ${name}`, "text-yellow-400");
    }

    function startSystem() {
        // รีเซ็ตเพื่อความชัวร์
        document.getElementById('barA').style.height = '0%';
        document.getElementById('barB').style.height = '0%';
        document.getElementById('barC').style.height = '0%';
        
        setTimeout(() => {
            addLog("เริ่มการบำบัด...", "text-blue-400");
            document.getElementById('barA').style.height = '85%';
            document.getElementById('barB').style.height = '70%';
            document.getElementById('barC').style.height = '95%';
        }, 50);

        setTimeout(() => addLog("ระบบคาร์บอนทำงาน...", "text-teal-300"), 2000);
        setTimeout(() => {
            addLog("บำบัดสำเร็จ", "text-green-400");
            document.getElementById('val-ph').innerText = "7.2";
            document.getElementById('val-turb').innerText = "1.6";
            document.getElementById('val-odor').innerText = "0%";
        }, 7000);
    }
</script>
</body>
</html>
