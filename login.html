<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPure - เข้าสู่ระบบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm border border-slate-100">
        
        <div id="loginForm">
            <h2 class="text-3xl font-bold text-center mb-8 text-slate-800">เข้าสู่ระบบ</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                <input type="password" id="password" placeholder="รหัสผ่าน" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">เข้าสู่ระบบ</button>
            </div>
            <p class="mt-6 text-center text-sm text-slate-500">ยังไม่มีบัญชี? <a onclick="toggleForm()" class="text-blue-600 font-bold cursor-pointer hover:underline">สมัครสมาชิกใหม่</a></p>
        </div>

        <div id="registerForm" class="hidden">
            <h2 class="text-3xl font-bold text-center mb-8 text-slate-800">สมัครสมาชิกใหม่</h2>
            <div class="space-y-4">
                <input type="text" id="regUser" placeholder="ตั้งชื่อผู้ใช้งาน" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl">
                <input type="password" id="regPass" placeholder="ตั้งรหัสผ่าน" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl">
                <button onclick="handleRegister()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-bold hover:bg-emerald-600 transition shadow-lg shadow-emerald-200">ลงทะเบียน</button>
            </div>
            <p class="mt-6 text-center text-sm text-slate-500">มีบัญชีอยู่แล้ว? <a onclick="toggleForm()" class="text-blue-600 font-bold cursor-pointer hover:underline">เข้าสู่ระบบ</a></p>
        </div>
    </div>

    <script>
        function toggleForm() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
        }

        function handleRegister() {
            var user = document.getElementById('regUser').value.trim();
            var pass = document.getElementById('regPass').value;
            if(user && pass) {
                localStorage.setItem("storedUser", user);
                localStorage.setItem("storedPass", pass);
                alert("สมัครสมาชิกสำเร็จ!");
                toggleForm();
            } else {
                alert("กรุณากรอกข้อมูลให้ครบ");
            }
        }

        function checkLogin() {
            var user = document.getElementById("username").value.trim();
            var pass = document.getElementById("password").value;
            var storedUser = localStorage.getItem("storedUser");
            var storedPass = localStorage.getItem("storedPass");

            if((user === "admin" && pass === "1234") || (user === storedUser && pass === storedPass)) {
                localStorage.setItem("isLoggedIn", "true");
                window.location.href = "dashboard.html";
            } else {
                alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
            }
        }
    </script>
</body>
</html>
