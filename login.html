<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPure - เข้าสู่ระบบ / สมัครสมาชิก</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
            color: #0284c7;
            font-size: 2rem;
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #0284c7;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0284c7;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #0369a1;
        }

        .switch-form {
            text-align: center;
            margin-top: 20px;
            color: #64748b;
        }

        .switch-form a {
            color: #0284c7;
            text-decoration: none;
            font-weight: bold;
        }

        .error-msg {
            color: #ef4444;
            background: #fee2e2;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            font-size: 0.9rem;
            text-align: center;
        }

        #dashboardSection {
            display: none;
            text-align: center;
        }

        .welcome-box {
            background: #f0fdf4;
            border: 2px solid #bbf7d0;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .btn-logout {
            background: #ef4444;
        }

        .btn-logout:hover {
            background: #dc2626;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div id="loginSection">
            <div class="logo">
                <i class="fas fa-leaf"></i> EcoPure
            </div>
            
            <div id="errorMsg" class="error-msg">❌ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
            <div id="regErrorMsg" class="error-msg">❌ กรุณากรอกข้อมูลให้ครบถ้วน และรหัสผ่านต้องตรงกัน</div>

            <div id="loginForm">
                <h3 style="margin-bottom: 20px; text-align: center; color: #334155;">เข้าสู่ระบบผู้ดูแลระบบ</h3>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="รหัสผ่าน">
                </div>
                <button onclick="checkLogin()">เข้าสู่ระบบ</button>
                <div class="switch-form">
                    ยังไม่มีบัญชีผู้ใช้? <a href="#" onclick="showRegister()">สมัครผู้ใช้ใหม่ที่นี่</a>
                </div>
            </div>

            <div id="registerForm" style="display: none;">
                <h3 style="margin-bottom: 20px; text-align: center; color: #334155;">สมัครสมาชิกใหม่</h3>
                <div class="input-group">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="regName" placeholder="ชื่อ-นามสกุล">
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="อีเมล">
                </div>
                <div class="input-group">
                    <i class="fas fa-user-plus"></i>
                    <input type="text" id="regUser" placeholder="ตั้งชื่อผู้ใช้งาน">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPass" placeholder="ตั้งรหัสผ่าน">
                </div>
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="password" id="regPassConfirm" placeholder="ยืนยันรหัสผ่านอีกครั้ง">
                </div>
                <button onclick="handleRegister()">ลงทะเบียน</button>
                <div class="switch-form">
                    มีบัญชีอยู่แล้ว? <a href="#" onclick="showLogin()">เข้าสู่ระบบ</a>
                </div>
            </div>
        </div>

        <div id="dashboardSection">
            <div class="welcome-box">
                <i class="fas fa-check-circle" style="font-size: 3rem; color: #22c55e; margin-bottom: 15px;"></i>
                <h2>ยินดีต้อนรับเข้าสู่ระบบ</h2>
                <p style="margin-top: 10px; color: #64748b;">คุณ: <span id="userDisplay" style="font-weight: bold; color: #0284c7;">-</span></p>
            </div>
            <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
        </div>
    </div>

    <script>
        function showRegister() {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("registerForm").style.display = "block";
            document.getElementById("errorMsg").style.display = "none";
            document.getElementById("regErrorMsg").style.display = "none";
        }

        function showLogin() {
            document.getElementById("registerForm").style.display = "none";
            document.getElementById("loginForm").style.display = "block";
            document.getElementById("errorMsg").style.display = "none";
            document.getElementById("regErrorMsg").style.display = "none";
        }

        function handleRegister() {
            var fullName = document.getElementById("regName").value;
            var email = document.getElementById("regEmail").value;
            var newUser = document.getElementById("regUser").value;
            var newPass = document.getElementById("regPass").value;
            var confirmPass = document.getElementById("regPassConfirm").value;

            if(!fullName || !email || !newUser || !newPass || newPass !== confirmPass) {
                document.getElementById("regErrorMsg").style.display = "block";
                return;
            }

            // บันทึกข้อมูลลงในบราวเซอร์ถาวร (เปลี่ยนหน้าก็ไม่หาย)
            localStorage.setItem("storedUser", newUser);
            localStorage.setItem("storedPass", newPass);
            localStorage.setItem("storedName", fullName);

            alert("🎉 สมัครสมาชิกสำเร็จแล้ว! ระบบจะพากลับไปหน้าหลัก");
            window.location.href = "index.html";
        }

        function checkLogin() {
            var user = document.getElementById("username").value;
            var pass = document.getElementById("password").value;
            
            // ดึงข้อมูลที่เคยสมัครไว้ในบราวเซอร์มาตรวจเช็ก
            var localUser = localStorage.getItem("storedUser");
            var localPass = localStorage.getItem("storedPass");
            var localName = localStorage.getItem("storedName");
            
            if((user === "admin" && pass === "1234") || (user === localUser && pass === localPass)) {
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("dashboardSection").style.display = "block";
                document.getElementById("userDisplay").innerText = user === "admin" ? "ผู้ดูแลระบบสูงสุด" : localName;
                document.getElementById("errorMsg").style.display = "none";
            } else {
                document.getElementById("errorMsg").innerHTML = `
                    ❌ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง <br>
                    <span style="color: #0077b6; cursor: pointer; text-decoration: underline; font-size: 0.9rem; font-weight: 600; display: inline-block; margin-top: 8px;" 
                          onclick="forgotPassword()">
                        💡 ลืมรหัสผ่านใช่ไหม? คลิกที่นี่เพื่อดูรหัสของคุณ
                    </span>
                `;
                document.getElementById("errorMsg").style.display = "block";
            }
        }

        function forgotPassword() {
            var user = document.getElementById("username").value;
            var localUser = localStorage.getItem("storedUser");
            var localPass = localStorage.getItem("storedPass");
            var localName = localStorage.getItem("storedName");
            
            if (!user) {
                alert("💡 กรุณากรอก 'ชื่อผู้ใช้งาน' ในช่องล็อกอินด้านบนก่อน เพื่อให้ระบบตรวจสอบรหัสผ่านครับ");
            } else if (user === "admin") {
                alert("🔑 บัญชีระบบสูงสุด (admin) รหัสผ่านคือ: 1234");
            } else if (user === localUser) {
                alert("🔑 บัญชีคุณ " + localName + "\n📌 ชื่อผู้ใช้: " + localUser + "\n🔒 รหัสผ่านของคุณคือ: " + localPass);
            } else {
                alert("❌ ไม่พบชื่อผู้ใช้งานนี้ในระบบ กรุณาตรวจสอบการสะกดอีกครั้งครับ");
            }
        }

        function logout() {
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            document.getElementById("errorMsg").style.display = "none";
            document.getElementById("loginSection").style.display = "block";
            document.getElementById("dashboardSection").style.display = "none";
        }
    </script>
</body>
</html>
