<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดต่อเรา | EcoPure</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">EcoPure</div>
            <nav>
                <ul>
                    <li><a href="index.html">หน้าแรก</a></li>
                    <li><a href="features.html">คุณสมบัติ</a></li>
                    <li><a href="products.html">สินค้าของเรา</a></li>
                    <li><a href="contact.html" class="active">ติดต่อเรา</a></li>
                    <li><a href="login.html" style="background:#0077b6; color:#fff; padding:8px 16px; border-radius:4px; text-decoration:none; font-weight:600;">เข้าสู่ระบบ</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="contact-page" style="padding: 120px 20px; min-height: calc(100vh - 140px); background: #f8f9fa;">
        <div class="container" style="max-width: 600px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h2 style="font-size: 2rem; color: #0077b6; margin-bottom: 25px; text-align: center;">ติดต่อสอบถามข้อมูล</h2>
            <form style="display: flex; flex-direction: column; gap: 20px;">
                <div>
                    <label style="display: block; margin-bottom: 8px; color: #333;">ชื่อผู้ติดต่อ</label>
                    <input type="text" placeholder="กรุณากรอกชื่อของคุณ" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px; color: #333;">เบอร์โทรศัพท์</label>
                    <input type="tel" placeholder="กรุณากรอกเบอร์โทรศัพท์" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px; color: #333;">ข้อความเพิ่มเติม</label>
                    <textarea rows="4" placeholder="พิมพ์ข้อความที่ต้องการติดต่อสอบถาม..." style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; resize: none;"></textarea>
                </div>
                <button type="button" style="background: #0077b6; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: 600;">ส่งข้อความ</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 EcoPure Water Tech. All Rights Reserved.</p>
    </footer>

</body>
</html>
