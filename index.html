<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPure | นวัตกรรมบำบัดน้ำเสีย</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Header -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-800">EcoPure</div>
            
            <!-- Hamburger Button - แสดงเฉพาะมือถือ -->
            <button id="menu-btn" class="md:hidden p-2 text-blue-800 border border-blue-800 rounded">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>

            <!-- เมนูหลัก -->
            <nav id="mobile-menu" class="hidden md:flex md:items-center space-x-6 absolute md:static top-16 left-0 w-full bg-white p-6 md:p-0 shadow-lg md:shadow-none z-40 text-center">
                <div class="flex flex-col md:flex-row gap-4 md:gap-6 items-center w-full">
                    <a href="index.html" class="font-bold text-blue-700">หน้าแรก</a>
                    <a href="#" class="hover:text-blue-600">คุณสมบัติ</a>
                    <a href="#" class="hover:text-blue-600">สินค้าของเรา</a>
                    <a href="contact.html" class="hover:text-blue-600">ติดต่อเรา</a>
                    <a href="login.html" class="bg-blue-800 text-white px-6 py-2 rounded-lg hover:bg-blue-900 transition">เข้าสู่ระบบ</a>
                </div>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <main class="relative h-[80vh] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-black/60 z-10"></div>
        <img src="https://images.unsplash.com/photo-1581092160607-ee22530dd90e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80" class="absolute inset-0 w-full h-full object-cover" alt="[รูปโรงงานอุตสาหกรรม]">
        
        <div class="relative z-20 text-center px-4 text-white">
            <h1 class="text-3xl md:text-5xl font-bold mb-4">เทคโนโลยีบำบัดน้ำเสีย เพื่ออนาคตที่ยั่งยืน</h1>
            <p class="text-lg md:text-xl mb-8">เครื่องบำบัดน้ำเสียประสิทธิภาพสูง ประหยัดพลังงาน เหมาะสำหรับโรงงานอุตสาหกรรมและชุมชน</p>
            <a href="contact.html" class="inline-block bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-8 rounded-lg shadow-lg transition duration-300">ขอคำปรึกษาฟรี</a>
        </div>
    </main>

    <script>
        const btn = document.getElementById('menu-btn');
        const menu = document.getElementById('mobile-menu');
        
        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
        });
    </script>
</body>
</html>
